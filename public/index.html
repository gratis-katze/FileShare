<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FelixShare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared.css">
    <style>
        .landing-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 720px;
            margin: 60px auto 0;
        }

        @media (max-width: 560px) {
            .landing-grid { grid-template-columns: 1fr; }
        }

        .space-card {
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 50px 30px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-decoration: none;
            display: block;
        }

        .space-card:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(120,219,255,0.5);
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(120,219,255,0.15);
        }

        .space-card-icon { font-size: 64px; margin-bottom: 20px; }

        .space-card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .space-card p {
            color: rgba(255,255,255,0.65);
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="space-particles" id="particles"></div>
    <div class="shooting-stars" id="shootingStars"></div>

    <div class="container">
        <h1>🚀 FelixShare</h1>

        <div class="landing-grid">
            <a href="/public" class="space-card">
                <div class="space-card-icon">🌍</div>
                <h2>Public Space</h2>
                <p>Share files with everyone — no account needed</p>
            </a>
            <a href="/private" class="space-card">
                <div class="space-card-icon">🔒</div>
                <h2>Private Space</h2>
                <p>Your encrypted personal file storage</p>
            </a>
        </div>
    </div>

    <script src="/shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            createStars();
            createParticles();
            createShootingStars();
        });
    </script>
</body>
</html>
